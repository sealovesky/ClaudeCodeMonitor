<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 赤陶渐变背景 -->
    <linearGradient id="bgGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B3A1F"/>
      <stop offset="50%" style="stop-color:#C4633F"/>
      <stop offset="100%" style="stop-color:#8B3A1F"/>
    </linearGradient>

    <!-- 背景光晕 -->
    <radialGradient id="glowBg" cx="50%" cy="40%" r="45%">
      <stop offset="0%" style="stop-color:#FFD4B8;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#FFD4B8;stop-opacity:0"/>
    </radialGradient>

    <!-- Claude logo 柔光 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 柱状图柔光 -->
    <filter id="barGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 强柔光 -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 柱状图渐变 -->
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.5)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.9)"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- 背景光晕效果 -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#glowBg)"/>

  <!-- 装饰星点 - 大星 -->
  <circle cx="85" cy="110" r="2.5" fill="#ffffff" opacity="0.45"/>
  <circle cx="435" cy="85" r="2" fill="#ffffff" opacity="0.5"/>
  <circle cx="420" cy="430" r="2.5" fill="#ffffff" opacity="0.35"/>
  <circle cx="65" cy="300" r="2" fill="#ffffff" opacity="0.4"/>

  <!-- 装饰星点 - 中星 -->
  <circle cx="170" cy="75" r="1.5" fill="#ffffff" opacity="0.35"/>
  <circle cx="360" cy="460" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="465" cy="210" r="1.5" fill="#ffffff" opacity="0.35"/>
  <circle cx="50" cy="190" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="300" cy="55" r="1.5" fill="#ffffff" opacity="0.35"/>
  <circle cx="130" cy="460" r="1.5" fill="#ffffff" opacity="0.25"/>

  <!-- 装饰星点 - 小星 -->
  <circle cx="110" cy="210" r="1" fill="#ffffff" opacity="0.25"/>
  <circle cx="440" cy="300" r="1" fill="#ffffff" opacity="0.2"/>
  <circle cx="240" cy="460" r="1" fill="#ffffff" opacity="0.25"/>
  <circle cx="390" cy="55" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="470" cy="400" r="1" fill="#ffffff" opacity="0.25"/>

  <!-- 微光点缀 -->
  <circle cx="95" cy="55" r="0.8" fill="#FFD4B8" opacity="0.3"/>
  <circle cx="475" cy="140" r="0.8" fill="#FFD4B8" opacity="0.25"/>
  <circle cx="55" cy="440" r="0.8" fill="#FFD4B8" opacity="0.25"/>

  <!-- Claude official logo (centered, slightly upper) with glow -->
  <g transform="translate(163, 108) scale(11.5)" fill="white" filter="url(#glow)">
    <path d="m3.127 10.604 3.135-1.76.053-.153-.053-.085H6.11l-.525-.032-1.791-.048-1.554-.065-1.505-.08-.38-.081L0 7.832l.036-.234.32-.214.455.04 1.009.069 1.513.105 1.097.064 1.626.17h.259l.036-.105-.089-.065-.068-.064-1.566-1.062-1.695-1.121-.887-.646-.48-.327-.243-.306-.104-.67.435-.48.585.04.15.04.593.456 1.267.981 1.654 1.218.242.202.097-.068.012-.049-.109-.181-.9-1.626-.96-1.655-.428-.686-.113-.411a2 2 0 0 1-.068-.484l.496-.674L4.446 0l.662.089.279.242.411.94.666 1.48 1.033 2.014.302.597.162.553.06.17h.105v-.097l.085-1.134.157-1.392.154-1.792.052-.504.25-.605.497-.327.387.186.319.456-.045.294-.19 1.23-.37 1.93-.243 1.29h.142l.161-.16.654-.868 1.097-1.372.484-.545.565-.601.363-.287h.686l.505.751-.226.775-.707.895-.585.759-.839 1.13-.524.904.048.072.125-.012 1.897-.403 1.024-.186 1.223-.21.553.258.06.263-.218.536-1.307.323-1.533.307-2.284.54-.028.02.032.04 1.029.098.44.024h1.077l2.005.15.525.346.315.424-.053.323-.807.411-3.631-.863-.872-.218h-.12v.073l.726.71 1.331 1.202 1.667 1.55.084.383-.214.302-.226-.032-1.464-1.101-.565-.497-1.28-1.077h-.084v.113l.295.432 1.557 2.34.08.718-.112.234-.404.141-.444-.08-.911-1.28-.94-1.44-.759-1.291-.093.053-.448 4.821-.21.246-.484.186-.403-.307-.214-.496.214-.98.258-1.28.21-1.016.19-1.263.112-.42-.008-.028-.092.012-.953 1.307-1.448 1.957-1.146 1.227-.274.109-.477-.247.045-.44.266-.39 1.586-2.018.956-1.25.617-.723-.004-.105h-.036l-4.212 2.736-.75.096-.324-.302.04-.496.154-.162 1.267-.871z"/>
  </g>

  <!-- 柱状图 with glow -->
  <g transform="translate(146, 425)" fill="url(#barGrad)" filter="url(#barGlow)">
    <rect x="0" y="-30" width="26" height="30" rx="5"/>
    <rect x="36" y="-52" width="26" height="52" rx="5"/>
    <rect x="72" y="-72" width="26" height="72" rx="5"/>
    <rect x="108" y="-48" width="26" height="48" rx="5"/>
    <rect x="144" y="-88" width="26" height="88" rx="5"/>
    <rect x="180" y="-60" width="26" height="60" rx="5"/>
    <rect x="216" y="-40" width="26" height="40" rx="5"/>
  </g>
</svg>
